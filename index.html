<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Falrio Browser</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    min-height: 100vh;
    background: #0b0b12;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    text-align: center;
    max-width: 700px;
    padding: 40px;
}

.logo {
    font-size: 60px;
    font-weight: bold;
    color: #7c5cff;
    margin-bottom: 20px;
}

h1 {
    font-size: 42px;
    margin-bottom: 15px;
}

p {
    color: #b8b8c7;
    font-size: 18px;
    line-height: 1.6;
}

.buttons {
    margin-top: 30px;
}

button {
    padding: 14px 28px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    font-size: 16px;
    margin: 10px;
}

.download {
    background: #7c5cff;
    color: white;
}

.github {
    background: #222;
    color: white;
    border: 1px solid #555;
}

.card {
    margin-top: 40px;
    padding: 25px;
    border-radius: 20px;
    background: #151522;
}

.features {
    display: flex;
    justify-content: space-around;
    margin-top: 20px;
}

.feature {
    padding: 15px;
}

footer {
    margin-top: 40px;
    color: #777;
}
</style>

</head>

<body>

<div class="container">

    <div class="logo">F</div>

    <h1>Falrio Browser</h1>

    <p>
        A privacy-focused Chromium-based browser built for speed,
        security, and a clean browsing experience.
    </p>

    <div class="buttons">
        <button class="download">
            Download Falrio
        </button>

        <button class="github">
            GitHub
        </button>
    </div>


    <div class="card">

        <h2>Why Falrio?</h2>

        <div class="features">

            <div class="feature">
                🔒<br>
                Privacy
            </div>

            <div class="feature">
                ⚡<br>
                Fast
            </div>

            <div class="feature">
                🎨<br>
                Custom
            </div>

        </div>

    </div>


    <footer>
        © 2026 Falrio Project
    </footer>

</div>

</body>
</html>
